# ============================================================
# Smart Logistics & Supply Chain Management System
# Application Configuration
# ============================================================

spring.application.name=Smart Logistics SCM

server.port=${PORT:8080}

# ============================================================
# MySQL Database Configuration
# ============================================================
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/smart_logistics?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# Thymeleaf
# ============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=SmartLogisticsSecretKey2024VeryLongSecretKeyForJWTTokenGeneration
app.jwt.expiration=86400000
app.jwt.prefix=Bearer 
app.jwt.header=Authorization

# ============================================================
# File Upload
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# Logging
# ============================================================
logging.level.com.logistics=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ============================================================
# Application Info
# ============================================================
app.name=Smart Logistics SCM
app.version=1.0.0
app.company=SmartLogistics Inc.

# ============================================================
# Redis Cache Configuration
# ============================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# ============================================================
# RabbitMQ AMQP Configuration
# ============================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=3s
spring.rabbitmq.listener.simple.retry.max-attempts=3

# ============================================================
# OpenAPI / Swagger Configuration
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha